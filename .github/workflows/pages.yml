# Deploys the app to GitHub Pages. If the repository defines an ANALYTICS_HEAD
# secret, its contents are appended to <head> at deploy time; without it
# the deploy is byte-identical to the source tree.
name: pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Inject extra head content (if configured)
        env:
          ANALYTICS_HEAD: ${{ secrets.ANALYTICS_HEAD }}
        run: |
          if [ -n "$ANALYTICS_HEAD" ]; then
            node -e '
              const fs = require("fs");
              let h = fs.readFileSync("index.html", "utf8");
              h = h.replace("</head>", process.env.ANALYTICS_HEAD + "\n</head>");
              fs.writeFileSync("index.html", h);
            '
            echo "extra head content injected"
          else
            echo "no ANALYTICS_HEAD secret — deploying source as-is"
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
